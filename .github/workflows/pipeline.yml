name: Manifest Pipeline

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      filter:
        description: 'Filter manifests by substring (ID, category, or provider)'
        required: false
        type: string

concurrency:
  group: manifest-pipeline
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v6

      - name: Download tool binaries
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download tools/latest --pattern 'astro-up-*' --dir bin
          chmod +x bin/astro-up-*

      - name: Restore pipeline state
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download catalog/latest --pattern 'pipeline-state.tar.gz' --dir . 2>/dev/null \
            && tar xzf pipeline-state.tar.gz && rm pipeline-state.tar.gz \
            || echo "No previous state found, starting fresh"

      - name: Cache Chromium binary
        uses: actions/cache@v5
        with:
          path: ~/.cache/chromiumoxide
          key: ${{ runner.os }}-chromium-v1
          restore-keys: ${{ runner.os }}-chromium-

      - name: Run version checker
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          CHECKER_FILTER: ${{ inputs.filter }}
        run: |
          FILTER_ARG=""
          if [ -n "$CHECKER_FILTER" ]; then
            FILTER_ARG="--filter $CHECKER_FILTER"
          fi
          ./bin/astro-up-checker \
            --manifests manifests \
            --versions versions \
            --state checker-state.json \
            $FILTER_ARG \
            --verbose

      - name: Compile catalog
        run: |
          ./bin/astro-up-compiler \
            --manifests manifests \
            --versions versions \
            --output catalog.db \
            --verbose

      - name: Install minisign
        env:
          MINISIGN_VERSION: '0.11'
        run: |
          curl -sL "https://github.com/jedisct1/minisign/releases/download/${MINISIGN_VERSION}/minisign-${MINISIGN_VERSION}-linux.tar.gz" -o minisign.tar.gz
          tar xzf minisign.tar.gz
          sudo install -m 755 minisign-linux/x86_64/minisign /usr/local/bin/minisign
          rm -rf minisign.tar.gz minisign-linux

      - name: Sign catalog
        env:
          MINISIGN_KEY: ${{ secrets.MINISIGN_KEY }}
        run: |
          echo "$MINISIGN_KEY" | base64 -d > /tmp/minisign.key
          minisign -Sm catalog.db -s /tmp/minisign.key -t "catalog $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          rm /tmp/minisign.key

      - name: Save pipeline state
        run: tar czf pipeline-state.tar.gz checker-state.json versions/

      - name: Publish to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create release if it doesn't exist
          gh release view catalog/latest > /dev/null 2>&1 || \
            gh release create catalog/latest --title "Catalog (latest)" --notes "Rolling release of the compiled catalog database."
          # Upload all artifacts
          gh release upload catalog/latest \
            catalog.db catalog.db.minisig pipeline-state.tar.gz \
            --clobber
