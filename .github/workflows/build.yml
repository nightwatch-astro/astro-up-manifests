name: Build Tools

on:
  push:
    branches: [main]
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'

permissions:
  contents: write

jobs:
  build:
    name: Build and publish binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Build release binaries
        run: cargo build --release --workspace

      - name: Upload binaries to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view tools/latest > /dev/null 2>&1 || \
            gh release create tools/latest --title "Tools (latest)" --notes "Rolling release of compiler and checker binaries."
          gh release upload tools/latest \
            target/release/astro-up-compiler \
            target/release/astro-up-checker \
            --clobber
