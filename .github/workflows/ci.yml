name: CI  on:   pull_request:     branches: [main]   push:     branches: [main]  concurrency:   group: ci-${{ github.ref }}   cancel-in-progress: true  permissions:   contents: read   pull-requests: read  jobs:   semantic-pr:     name: Semantic PR Title     runs-on: ubuntu-latest     if: github.event_name == 'pull_request'     steps:       - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6         env:           GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}    changes:     name: Detect changes     runs-on: ubuntu-latest     outputs:       rust: ${{ steps.filter.outputs.rust }}     steps:       - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6       - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3         id: filter         with:           filters: |             rust:               - 'crates/**'               - 'Cargo.toml'               - 'Cargo.lock'               - 'manifests/**'    rust:     name: Rust CI     needs: changes     if: needs.changes.outputs.rust == 'true'     runs-on: ubuntu-latest     steps:       - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6       - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable         with:           components: rustfmt, clippy       - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2       - run: cargo fmt --all -- --check       - run: cargo clippy --workspace -- -D warnings       - run: cargo test --workspace       - name: Validate manifests         run: cargo run -p astro-up-compiler -- --manifests manifests --validate    # Gate job: always runs, reports the required "Rust Checks" status.   # Passes when rust CI succeeds or was skipped (no Rust changes).   check:     name: Rust Checks     needs: [changes, rust]     if: always()     runs-on: ubuntu-latest     steps:       - name: Gate         env:           RUST_RESULT: ${{ needs.rust.result }}         run: |           if [ "$RUST_RESULT" = "failure" ] || [ "$RUST_RESULT" = "cancelled" ]; then             exit 1           fi
