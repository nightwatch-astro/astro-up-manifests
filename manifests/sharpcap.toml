manifest_version = 1
id = "sharpcap"
name = "SharpCap"
description = "Astronomy camera capture and live stacking"
publisher = "Robin Glover"
homepage = "https://www.sharpcap.co.uk"
category = "capture"
type = "application"
slug = "sharpcap"
tags = ["capture", "livestacking", "eaa"]

[detection]
method = "registry"
registry_key = "HKCU\\Software\\SharpCap"
registry_value = "Version"

[install]
method = "inno_setup"
scope = "user"
elevation = false

[checkver]
provider = "manual"
