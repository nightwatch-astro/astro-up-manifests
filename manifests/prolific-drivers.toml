manifest_version = 1
id = "prolific-drivers"
name = "Prolific PL2303 Drivers"
description = "Prolific PL2303 USB-serial drivers"
publisher = "Prolific"
homepage = "https://www.prolific.com.tw"
category = "usb"
type = "usb_driver"
slug = "prolific-drivers"

[detection]
method = "registry"
registry_key = "SOFTWARE\\Prolific\\PL2303"
registry_value = "Version"

[install]
method = "exe"
elevation = true

[install.switches]
silent = "/S"

[checkver]
provider = "manual"

[checkver.autoupdate]
url = "https://www.prolific.com.tw/UserFiles/files/PL23XX-M_LogoDriver_Setup_v208_20221028.exe"
