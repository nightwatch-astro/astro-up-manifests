manifest_version = 1
id = "green-swamp-server-app"
name = "Green Swamp Server"
description = "Green Swamp Server (GSServer) — ASCOM telescope driver for SkyWatcher/Orion mounts"
publisher = "Green Swamp Server"
homepage = "https://greenswamp.org"
category = "utilities"
type = "application"
slug = "green-swamp-server-app"

[detection]
method = "file"
path = "{program_dir}/GreenSwamp/GSServer.exe"

[install]
method = "inno_setup"

[install.switches]
silent = "/VERYSILENT /NORESTART /SUPPRESSMSGBOXES"

[checkver]
provider = "github"
owner = "rmorgan001"
repo = "GS.Point3d"

[checkver.autoupdate]
url = "https://github.com/rmorgan001/GS.Point3d/releases/download/v$version/GreenSwampServer-$version-Setup.exe"
