manifest_version = 1
id = "synscan-pro-app"
name = "SynScan Pro App"
description = "SynScan Pro application for mount control via Wi-Fi or USB"
publisher = "Sky-Watcher"
homepage = "https://www.skywatcher.com"
category = "driver"
type = "application"
slug = "synscan-pro-app"

[detection]
method = "file"

[install]
method = "zip_wrap"

[checkver]
provider = "html_scrape"
url = "https://www.skywatcher.com/download/software/synscan-app/"
regex = 'SynScan Pro App, Version (\d+\.\d+\.\d+)'
css_selector = ".list-page-object-name"

[checkver.autoupdate]
url = "https://inter-static.skywatcher.com/downloads/synscanpro_windows_$cleanVersion.zip"
