manifest_version = 1
id = "zwo-native-driver"
name = "ZWO ASI Native Camera Driver"
description = "Native USB camera driver for all ZWO ASI cameras"
publisher = "ZWO"
homepage = "https://www.zwoastro.com"
category = "driver"
type = "usb_driver"
slug = "zwo-native-driver"

[detection]
method = "registry"
registry_key = "SOFTWARE\\ZWO\\ASICamera"
registry_value = "Version"

[install]
method = "exe"
elevation = true

[install.switches]
silent = "/S"

[checkver]
provider = "http_head"
url = "https://dl.zwoastro.com/software?app=AsiCameraDriver&platform=windows64&region=Overseas"
regex = 'filename=ZWO_ASI_Cameras_driver_Setup_V(\d+\.\d+\.\d+\.\d+)\.exe'

[checkver.autoupdate]
url = "https://dl.zwoastro.com/software?app=AsiCameraDriver&platform=windows64&region=Overseas"
