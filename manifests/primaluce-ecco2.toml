manifest_version = 1
id = "primaluce-ecco2"
name = "PrimaLuce ECCO2 Software Package"
description = "Driver and software package for PrimaLuce ECCO2 environmental controller"
publisher = "PrimaLuce Lab"
homepage = "https://www.primalucelab.com"
category = "driver"
type = "driver"
slug = "primaluce-ecco2"

[detection]
method = "file"
path = "{program_dir}/PrimaLuceLab/ECCO2/ECCO2.exe"

[install]
method = "zip_wrap"

[checkver]
provider = "browser_scrape"
url = "https://www.primalucelab.com/info/downloads.html"
regex = 'ECCO2-software-package-(\d+-\d+(?:-\d+)*)\.zip'

[checkver.autoupdate]
url = "https://www.primalucelab.com/downloads/ECCO2-software-package-3-2.zip"
