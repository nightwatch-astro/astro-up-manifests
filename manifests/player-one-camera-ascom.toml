manifest_version = 1
id = "player-one-camera-ascom"
name = "Player One Camera ASCOM Driver"
description = "ASCOM driver for Player One astronomy cameras"
publisher = "Player One Astronomy"
homepage = "https://player-one-astronomy.com"
category = "driver"
type = "driver"
slug = "player-one-camera-ascom"

[detection]
method = "file"
path = "{program_dir}/Common Files/ASCOM/Camera/PlayerOne.Camera.dll"

[install]
method = "zip_wrap"

[checkver]
provider = "html_scrape"
url = "https://player-one-astronomy.com/service/software/"
regex = '_V(\d+\.\d+\.\d+\.\d+)\.'

[checkver.autoupdate]
url = "https://player-one-astronomy.com/service/download/PlayerOne_Camera_ASCOM_V$version.zip"

[dependencies]
requires = ["ascom-platform", "player-one-native-driver"]
