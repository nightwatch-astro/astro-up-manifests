manifest_version = 1
id = "ioptron-upgrade-utility-v2"
name = "iOptron Upgrade Utility V2"
description = "Firmware upgrade utility for iOptron mounts (V2, older models)"
homepage = "https://www.ioptron.com"
category = "driver"
type = "application"
slug = "ioptron-upgrade-utility-v2"

[detection]
method = "file"

[install]
method = "exe"
elevation = true

[install.switches]
silent = "/S"

[checkver]
provider = "browser_scrape"
url = "https://www.ioptron.com/Articles.asp?ID=309"
regex = 'Utility(\d{3})\.exe'

[checkver.autoupdate]
url = "https://www.ioptron.com/v/firmware/iOptronUpgradeUtility223.exe"
