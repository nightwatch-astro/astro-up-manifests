manifest_version = 1
id = "astap-d20"
name = "ASTAP D20 Star Database"
description = "Smaller star database for ASTAP plate solver (375 MB)"
publisher = "ASTAP"
homepage = "https://www.hnsky.org/astap.htm"
category = "platesolving"
type = "database"
slug = "astap-d20"

[detection]
method = "file"
path = "{config_dir}/astap/d20"

[install]
method = "exe"
elevation = true

[checkver]
provider = "http_head"
url = "https://sourceforge.net/projects/astap-program/files/star_databases/d20_star_database.exe/download"

[checkver.autoupdate]
url = "https://sourceforge.net/projects/astap-program/files/star_databases/d20_star_database.exe/download"

[dependencies]
requires = ["astap-app"]
