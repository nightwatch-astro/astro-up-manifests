manifest_version = 1
id = "celestron-focuser-usb-ascom"
name = "Celestron Focuser USB ASCOM Driver"
description = "ASCOM driver for Celestron USB focuser"
homepage = "https://www.celestron.com"
category = "driver"
type = "driver"
slug = "celestron-focuser-usb-ascom"

[detection]
method = "file"

[install]
method = "exe"
elevation = true

[install.switches]
silent = "/S"

[checkver]
provider = "pe_download"
url = "https://software.celestron.com/public_release/Focuser_USB_ASCOM_Setup.exe"

[checkver.autoupdate]
url = "https://software.celestron.com/public_release/Focuser_USB_ASCOM_Setup.exe"

[dependencies]
requires = ["ascom-platform"]
