manifest_version = 1
id = "qhy-allinone"
name = "QHY AllInOne Driver Pack"
description = "AllInOne pack: system drivers, ASCOM camera and filter wheel drivers, WDM broadcast driver, EZCAP_QT, SDKs, and SharpCap"
publisher = "QHY"
homepage = "https://www.qhyccd.com"
category = "driver"
type = "driver"
slug = "qhy-allinone"

[detection]
method = "registry"
registry_key = "SOFTWARE\\QHYCCD\\AllInOne"
registry_value = "Version"

[install]
method = "exe"
elevation = true

[install.switches]
silent = "/S"

[checkver]
provider = "browser_scrape"
url = "https://www.qhyccd.com/download/"
regex = 'Ver\. (\d{8}) \(Recommended\)'

[checkver.autoupdate]
url = "https://www.qhyccd.com/file/repository/AllInOne/V$version/QHY_AllInOne_V$version.exe"

[dependencies]
requires = ["ascom-platform"]
