manifest_version = 1
id = "primaluce-alto"
name = "PrimaLuce ALTO Software Package"
description = "Driver and software package for PrimaLuce ALTO telescope cover motor"
publisher = "PrimaLuce Lab"
homepage = "https://www.primalucelab.com"
category = "driver"
type = "driver"
slug = "primaluce-alto"

[detection]
method = "file"
path = "{program_dir}/PrimaLuceLab/ALTO/ALTO.exe"

[install]
method = "zip_wrap"

[checkver]
provider = "browser_scrape"
url = "https://www.primalucelab.com/info/downloads.html"
regex = 'ALTO-software-package-(\d+-\d+(?:-\d+)*)\.zip'

[checkver.autoupdate]
url = "https://www.primalucelab.com/downloads/ALTO-software-package-1-4.zip"
