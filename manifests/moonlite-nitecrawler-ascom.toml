manifest_version = 1
id = "moonlite-nitecrawler-ascom"
name = "MoonLite NiteCrawler ASCOM Driver"
description = "ASCOM driver for MoonLite NiteCrawler focuser/rotator"
homepage = "https://focuser.com"
category = "driver"
type = "driver"
slug = "moonlite-nitecrawler-ascom"

[detection]
method = "file"

[install]
method = "zip_wrap"

[checkver]
provider = "html_scrape"
url = "https://focuser.com/downloads.php"
regex = 'NiteCrawler\s+Setup\s+(\d+\.\d+\.\d+)'

[dependencies]
requires = ["ascom-platform"]
