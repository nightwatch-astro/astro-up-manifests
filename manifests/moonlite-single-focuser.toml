manifest_version = 1
id = "moonlite-single-focuser"
name = "MoonLite Single Focuser Control"
description = "Standalone control application for MoonLite single-port focuser controllers"
publisher = "MoonLite"
homepage = "https://focuser.com"
category = "driver"
type = "application"
slug = "moonlite-single-focuser"

[detection]
method = "file"

[install]
method = "zip_wrap"

[checkver]
provider = "html_scrape"
url = "https://focuser.com/downloads.php"
regex = '_v(\d+\.\d+)\.zip'

[checkver.autoupdate]
url = "https://focuser.com/media/Downloads/MoonLite_Software/NonAscom/MoonliteSingleFocuser_v$version.zip"
