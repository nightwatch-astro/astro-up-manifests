manifest_version = 1
id = "nexdome-ascom"
name = "NexDome ASCOM Driver"
description = "ASCOM driver for NexDome observatory dome"
publisher = "NexDome"
homepage = "https://nexdome.com"
category = "driver"
type = "driver"
slug = "nexdome-ascom"

[detection]
method = "file"

[install]
method = "exe"
elevation = true

[checkver]
provider = "github"
owner = "nexdome"
repo = "ASCOM"

[checkver.autoupdate]
url = "https://github.com/nexdome/ASCOM/releases/download/v$version/NexDome-Setup.exe"

[dependencies]
requires = ["ascom-platform"]
