manifest_version = 1
id = "astroasis-focuser-ascom"
name = "Astroasis Focuser ASCOM Driver"
description = "ASCOM driver for Astroasis Oasis Focuser"
publisher = "Astroasis"
homepage = "https://www.astroasis.com"
category = "driver"
type = "driver"
slug = "astroasis-focuser-ascom"

[detection]
method = "file"
path = "{program_dir}/Common Files/ASCOM/Focuser/Astroasis.Focuser.dll"

[install]
method = "exe"
elevation = true

[install.switches]
silent = "/S"

[checkver]
provider = "html_scrape"
url = "https://www.astroasis.com/download/"
regex = '_(\d+\.\d+\.\d+\.\d+)_'

[checkver.autoupdate]
url = "https://www.astroasis.com/download/files/focuser/Astroasis_Oasis_Focuser_ASCOM_$version_Setup.zip"

[dependencies]
requires = ["ascom-platform"]
