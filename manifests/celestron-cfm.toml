manifest_version = 1
id = "celestron-cfm"
name = "Celestron Firmware Manager"
description = "Firmware update utility for Celestron telescopes and accessories"
publisher = "Celestron"
homepage = "https://www.celestron.com"
category = "driver"
type = "application"
slug = "celestron-cfm"

[detection]
method = "file"

[install]
method = "zip_wrap"

[checkver]
provider = "html_scrape"
url = "https://software.celestron.com/updates/CFM/CFM/release.json"
regex = '"version"\s*:\s*"([\d.]+)"'
