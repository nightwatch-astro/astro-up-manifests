manifest_version = 1
id = "ioptron-upgrade-utility-v3"
name = "iOptron Upgrade Utility V3"
description = "Firmware upgrade utility for iOptron mounts (V3)"
publisher = "iOptron"
homepage = "https://www.ioptron.com"
category = "driver"
type = "application"
slug = "ioptron-upgrade-utility-v3"

[detection]
method = "file"

[install]
method = "exe"
elevation = true

[install.switches]
silent = "/S"

[checkver]
provider = "browser_scrape"
url = "https://www.ioptron.com/Articles.asp?ID=360"
regex = 'Utility(\d{3})\.exe'

[checkver.autoupdate]
url = "https://www.ioptron.com/v/firmware/iOptronUpgradeUtility327.exe"
