manifest_version = 1
id = "primaluce-eagle-x"
name = "PrimaLuce EAGLE X Software Package"
description = "Software package for PrimaLuce EAGLE X telescope computer"
publisher = "PrimaLuce Lab"
homepage = "https://www.primalucelab.com"
category = "utilities"
type = "application"
slug = "primaluce-eagle-x"

[detection]
method = "file"
path = "{program_dir}/PrimaLuceLab/EAGLE-X/EAGLE-X.exe"

[install]
method = "zip_wrap"

[checkver]
provider = "browser_scrape"
url = "https://www.primalucelab.com/info/downloads.html"
regex = 'EAGLE-X-software-package-(\d+-\d+-\d+(?:-\d+)*)\.zip'

[checkver.autoupdate]
url = "https://www.primalucelab.com/downloads/EAGLE-X-software-package-3-1-0.zip"
