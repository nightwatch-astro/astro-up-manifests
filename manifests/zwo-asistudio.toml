manifest_version = 1
id = "zwo-asistudio"
name = "ZWO ASIStudio"
description = "ZWO all-in-one imaging suite for ASI cameras"
publisher = "ZWO"
homepage = "https://www.zwoastro.com"
category = "capture"
type = "application"
slug = "zwo-asistudio"

[detection]
method = "registry"
registry_key = "SOFTWARE\\ZWO\\ASIStudio"
registry_value = "Version"
fallback_method = "pe_file"
fallback_path = "{program_dir}/ZWO/ASIStudio/ASIStudio.exe"

[install]
method = "exe"
elevation = true

[install.switches]
silent = "/S"

[checkver]
provider = "browser_scrape"
url = "https://www.zwoastro.com/software/"
css_selector = "js:document.querySelectorAll('.elementor-tab-title').forEach(t => { if (t.textContent.trim() === 'Desktop App') t.click() })"
regex = 'ASIStudio.*?[Vv](\d+\.\d+(?:\.\d+)?)'

[checkver.autoupdate]
url = "https://dl.zwoastro.com/software?app=ASIStudio&platform=windows64&region=Overseas"
