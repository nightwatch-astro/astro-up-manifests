manifest_version = 1
id = "lunatico-cloudwatcher-software"
name = "Lunatico AAG CloudWatcher Data Display"
description = "Data display software for Lunatico AAG CloudWatcher"
homepage = "https://lunaticoastro.com"
category = "driver"
type = "application"
slug = "lunatico-cloudwatcher-software"

[detection]
method = "file"

[install]
method = "exe"
elevation = true

[install.switches]
silent = "/S"

[checkver]
provider = "pe_download"
url = "https://lunaticoastro.com/aagcw/current/CWDataDisplay-Install.exe"

[checkver.autoupdate]
url = "https://lunaticoastro.com/aagcw/current/CWDataDisplay-Install.exe"
