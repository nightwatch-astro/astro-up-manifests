manifest_version = 1
id = "synscan-firmware-loader-wifi"
name = "SynScan Motor Controller Firmware Loader (WiFi)"
description = "Firmware loader for SynScan motor controllers via WiFi"
publisher = "Sky-Watcher"
homepage = "https://www.skywatcher.com"
category = "driver"
type = "application"
slug = "synscan-firmware-loader-wifi"

[detection]
method = "file"

[install]
method = "zip_wrap"

[checkver]
provider = "html_scrape"
url = "https://www.skywatcher.com/download/software/motor-control-firmware/"
regex = 'Motor Controller Firmware Loader - WiFi, Version (\d+\.\d+)'
css_selector = ".list-page-object-name"

[checkver.autoupdate]
url = "https://inter-static.skywatcher.com/downloads/mcfirmwareloader_wifi_$cleanVersion.zip"
