manifest_version = 1
id = "astroasis-fw-ascom"
name = "Astroasis Filter Wheel ASCOM Driver"
description = "ASCOM driver for Astroasis filter wheels"
homepage = "https://www.astroasis.com"
category = "driver"
type = "driver"
slug = "astroasis-fw-ascom"

[detection]
method = "file"
path = "{program_dir}/Common Files/ASCOM/FilterWheel/Astroasis.FilterWheel.dll"

[install]
method = "exe"
elevation = true

[install.switches]
silent = "/S"

[checkver]
provider = "html_scrape"
url = "https://www.astroasis.com/download/"
regex = '_(\d+\.\d+\.\d+\.\d+)_'

[dependencies]
requires = ["ascom-platform"]
