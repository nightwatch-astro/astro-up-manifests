manifest_version = 1
id = "qhy-polemaster"
name = "QHY PoleMaster"
description = "QHY PoleMaster electronic polar alignment software"
publisher = "QHY"
homepage = "https://www.qhyccd.com"
category = "utilities"
type = "application"
slug = "qhy-polemaster"

[detection]
method = "file"
path = "{program_dir}/PoleMaster/PoleMaster.exe"

[install]
method = "zip_wrap"

[checkver]
provider = "html_scrape"
url = "https://www.qhyccd.com/download/"
regex = '_V(\d+\.\d+\.\d+\.\d+)\.'

[checkver.autoupdate]
url = "https://www.qhyccd.com/file/repository/PoleMaster/PoleMaster_V$version.zip"
