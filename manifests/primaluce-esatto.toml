manifest_version = 1
id = "primaluce-esatto"
name = "PrimaLuce ESATTO Software Package"
description = "Driver and software package for PrimaLuce ESATTO robotic focuser"
homepage = "https://www.primalucelab.com"
category = "driver"
type = "driver"
slug = "primaluce-esatto"

[detection]
method = "file"
path = "{program_dir}/PrimaLuceLab/ESATTO/ESATTO.exe"

[install]
method = "zip_wrap"

[checkver]
provider = "html_scrape"
url = "https://www.primalucelab.com/info/downloads.html"

[checkver.autoupdate]
url = "https://www.primalucelab.com/downloads/ESATTO-software-package-3-7.zip"
